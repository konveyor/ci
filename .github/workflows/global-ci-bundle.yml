name: Konveyor e2e CI via Operator Bundle shared workflow

on:
  pull_request:
    types: [opened, reopened, edited]
    paths:
      - '.github/workflows/global-ci-bundle.yml'
  workflow_call:
    inputs:
      artifact:
        description: |
          The name of the artifact storing custom images to be used during the CI run. All
          images stored in the artifact will be automatically loaded.
        type: string
        required: false
      operator_bundle:
        description: image uri for operator-bundle (ie. quay.io/<namespace>/<image-name>:<tag>). Must be pullable.
        type: string
        required: false
        default: ""
      base_tag:
        description: tag for operator image (ie. release-0.7) to build custom bundle on top of it. Is added to operator base image URL.
        type: string
        required: false
        default: "latest"
      oauth_proxy:
        description: image uri for oauth_proxy (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      tackle_hub:
        description: image uri for tackle-hub (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      tackle_postgres:
        description: image uri for tackle-postgres (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      keycloak_sso:
        description: image uri for keycloak_sso image (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      keycloak_init:
        description: image uri for keycloak_init image (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      tackle_ui:
        description: image uri for tackle-ui (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      addon_analyzer:
        description: image uri for analyzer addon (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      addon_discovery:
        description: image uri for discovery addon (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      kantra:
        description: image uri for kantra (ie. quay.io/<namespace>/<image-name>:<tag>)
        type: string
        required: false
        default: ""
      namespace:
        description: |
          Namespace for the konveyor install.
        type: string
        required: false
        default: "konveyor-tackle"
      tackle_cr:
        description: |
          Full JSON encoded string representing the Tackle resource to be created.
        type: string
        required: false
        default: |
          kind: Tackle
          apiVersion: tackle.konveyor.io/v1alpha1
          metadata:
            name: tackle
          spec:
            image_pull_policy: IfNotPresent
            analyzer_container_requests_cpu: 100m
            provider_java_container_requests_cpu: 100m
            provider_python_container_requests_cpu: 100m
            feature_auth_required: false
            disable_maven_search: true
      run_api_tests:
        description: |
          A flag that determines whether the API tests should be run or not
        type: boolean
        required: false
        default: true
      run_ui_tests:
        description: |
          A flag that determines whether the UI tests should be run or not
        type: boolean
        required: false
        # TODO: Swap to true once these are passing consistently
        default: false
      api_tests_ref:
        description: |
          The branch or PR of the go-konveyor-tests repository to clone.
          For a pull request, the reference format would be "refs/pull/${PR_NUMBER}/merge".
          For a branch, the reference format would just be the branch name.
          This input can be set automatically on a pull request by adding a string of the format:
            Go tests PR: 140
          replacing "140" with the appropriate PR number. This will make it easier to coordinate changes
          that require updating the global tests as well.
        required: false
        type: string
        default: main
      api_tests_tiers:
        description: |
          The make command to execute from go-konveyor-tests repository
        required: false
        type: string
        default: make test-tier0 test-tier1 test-hub-api
      api_hub_tests_ref:
          description: |
            The branch or PR of the Hub API tests from tackle2-hub repository to clone.
            For a pull request, the reference format would be "refs/pull/${PR_NUMBER}/merge".
            For a branch, the reference format would just be the branch name.
          required: false
          type: string
          default: main
      ui_tests_ref:
        description: |
          The branch or PR of the tackle-ui-tests repository to clone.
          For a pull request, the reference format would be "refs/pull/${PR_NUMBER}/merge".
          For a branch, the reference format would just be the branch name.
          This input can be set automatically on a pull request by adding a string of the format:
            UI tests PR: 140
          replacing "140" with the appropriate PR number. This will make it easier to coordinate changes
          that require updating the global tests as well.
        required: false
        type: string
        default: main
      ui_test_tags:
        description: |
          A comma separated list of test tags/tiers to select the ui tests to run. Each tag/tier
          needs to be explicitly included in the list. For example, to use tiers ci, 0, 1, and 2,
          the value should be: "@ci,@tier0,@tier1,@tier2".
        required: false
        type: string
        default: "@ci"
      run_koncur_hub_tests:
        description: A flag that determines whether the koncur tackle-hub tests should be run
        type: boolean
        required: false
        default: false
      run_koncur_kantra_tests:
        description: A flag that determines whether the koncur kantra tests should be run
        type: boolean
        required: false
        default: false
#     See https://github.com/konveyor/ci/issues/224
      run_windows_kantra_tests:
        description: A flag that determines whether to run Windows kantra tests (Linux always runs if run_koncur_kantra_tests is true)
        type: boolean
        required: false
        default: true
      koncur_ref:
        description: The branch or ref of the koncur repository to use for tests
        type: string
        required: false
        default: main
      koncur_skip_maven:
        description: Whether to skip setting up maven for koncur tests
        type: boolean
        required: false
        default: true

  workflow_dispatch:
    inputs:
      operator_bundle:
        description: image uri for operator-bundle (ie. quay.io/<namespace>/<image-name>:<tag>). Must be pullable.
        type: string
        required: false
        default: "quay.io/konveyor/tackle2-operator-bundle:latest"
      base_tag:
        description: tag for operator image (ie. release-0.7) to build custom bundle on top of it. Is added to operator base image URL.
        type: string
        required: false
        default: "latest"
      namespace:
        description: |
          Namespace for the konveyor install.
        type: string
        required: false
        default: ""
      tackle_cr:
        description: |
          Full JSON encoded string representing the Tackle resource to be created.
        type: string
        required: false
        default: |
          kind: Tackle
          apiVersion: tackle.konveyor.io/v1alpha1
          metadata:
            name: tackle
          spec:
            image_pull_policy: IfNotPresent
            analyzer_container_requests_cpu: 100m
            provider_java_container_requests_cpu: 100m
            provider_python_container_requests_cpu: 100m
            feature_auth_required: false
            disable_maven_search: true
      run_api_tests:
        description: |
          A flag that determines whether the API tests should be run or not
        type: boolean
        required: false
        default: true
      run_ui_tests:
        description: |
          A flag that determines whether the UI tests should be run or not
        type: boolean
        required: false
        # TODO: Swap to true once these are passing consistently
        default: false
      api_tests_ref:
        description: |
          The branch or PR of the go-konveyor-tests repository to clone.
          For a pull request, the reference format would be "refs/pull/${PR_NUMBER}/merge".
          For a branch, the reference format would just be the branch name.
          This input can be set automatically on a pull request by adding a string of the format:
            Go tests PR: 140
          replacing "140" with the appropriate PR number. This will make it easier to coordinate changes
          that require updating the global tests as well.
        required: false
        type: string
        default: main
      api_tests_tiers:
        description: |
          The make command to execute from go-konveyor-tests repository
        required: false
        type: string
        default: make test-tier0 test-tier1
      ui_tests_ref:
        description: |
          The branch or PR of the tackle-ui-tests repository to clone.
          For a pull request, the reference format would be "refs/pull/${PR_NUMBER}/merge".
          For a branch, the reference format would just be the branch name.
          This input can be set automatically on a pull request by adding a string of the format:
            UI tests PR: 140
          replacing "140" with the appropriate PR number. This will make it easier to coordinate changes
          that require updating the global tests as well.
        required: false
        type: string
        default: main
      ui_test_tags:
        description: |
          A comma separated list of test tags/tiers to select the ui tests to run. Each tag/tier
          needs to be explicitly included in the list. For example, to use tiers ci, 0, 1, and 2,
          the value should be: "@ci,@tier0,@tier1,@tier2".
        required: false
        type: string
        default: "@ci"

env:
  operator_bundle: ttl.sh/konveyor-operator-bundle-${{ github.sha }}:4h
  KANTRA_INPUT: ${{ inputs.kantra }}
  BASE_TAG_INPUT: ${{ inputs.base_tag }}
  KONCUR_REF_INPUT: ${{ inputs.koncur_ref }}

jobs:
  check-images:
    runs-on: ubuntu-22.04
    steps:
      - name: Check operator image exists
        if: ${{ inputs.operator_bundle != '' }}
        env:
          PROXY: ${{ inputs.oauth_proxy }}
          HUB: ${{ inputs.tackle_hub }}
          POSTGRES: ${{ inputs.tackle_postgres }}
          SSO: ${{ inputs.keycloak_sso }}
          INIT: ${{ inputs.keycloak_init }}
          UI: ${{ inputs.tackle_ui }}
          ANALYZER: ${{ inputs.addon_analyzer }}
          DISCOVERY: ${{ inputs.addon_discovery }}
        run: |
          docker manifest inspect ${{ inputs.operator_bundle }}
          # My cheap way to check if any other image is set
          if [ -n "${PROXY}${HUB}${POSTGRES}${SSO}${INIT}${UI}${ANALYZER}${DISCOVERY}" ]; then
            echo "::warning:: operator_bundle takes precendent over any other image specified!"
            echo "::warning:: consider removing the image and setting it on the Tackle CR."
          fi
      - name: Check oauth_proxy image exists
        if: ${{ inputs.oauth_proxy != '' }}
        run: docker manifest inspect ${{ inputs.oauth_proxy }}
      - name: Check tackle_hub image exists
        if: ${{ inputs.tackle_hub != '' }}
        run: docker manifest inspect ${{ inputs.tackle_hub }}
      - name: Check tackle_postgres image exists
        if: ${{ inputs.tackle_postgres != '' }}
        run: docker manifest inspect ${{ inputs.tackle_postgres }}
      - name: Check keycloak_sso image exists
        if: ${{ inputs.keycloak_sso != '' }}
        run: docker manifest inspect ${{ inputs.keycloak_sso }}
      - name: Check keycloak_init image exists
        if: ${{ inputs.keycloak_init != '' }}
        run: docker manifest inspect ${{ inputs.keycloak_init }}
      - name: Check tackle_ui image exists
        if: ${{ inputs.tackle_ui != '' }}
        run: docker manifest inspect ${{ inputs.tackle_ui }}
      - name: Check addon_analyzer image exists
        if: ${{ inputs.addon_analyzer != '' }}
        run: docker manifest inspect ${{ inputs.addon_analyzer }}
      - name: Check addon_discovery image exists
        if: ${{ inputs.addon_discovery != '' }}
        run: docker manifest inspect ${{ inputs.addon_discovery }}
      - name: Check kantra image exists
        if: ${{ inputs.run_koncur_kantra_tests }}
        run: |
          KANTRA_IMAGE="$KANTRA_INPUT"
          if [ -z "$KANTRA_IMAGE" ]; then
            KANTRA_IMAGE="quay.io/konveyor/kantra:${BASE_TAG_INPUT}"
          fi
          docker manifest inspect "$KANTRA_IMAGE"

  e2e-api-integration-tests:
    needs: check-images
    runs-on: ubuntu-22.04
    if: ${{ inputs.run_api_tests }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Extract pull request number from inputs or PR description
        env:
          body: ${{ github.event.pull_request.body }}
        run: |
          PULL_REQUEST_NUMBER=$(echo ${body} | grep -oP '[A|a][P|p][I|i] [T|t]ests [P|p][R|r]:\s*\K\d+' || true)
          [ -z "$PULL_REQUEST_NUMBER" ] \
            && GOLANG_TESTS_REF=${{ inputs.api_tests_ref }} \
            || GOLANG_TESTS_REF=refs/pull/$PULL_REQUEST_NUMBER/merge

          echo "GOLANG_TESTS_REF=${GOLANG_TESTS_REF}" >>"$GITHUB_ENV"
          echo "Using GOLANG_TESTS_REF \`${GOLANG_TESTS_REF}\`" >>"$GITHUB_STEP_SUMMARY"

      - name: Checkout golang api tests repo
        uses: actions/checkout@v4
        with:
          repository: konveyor/go-konveyor-tests
          path: go-konveyor-tests
          ref: "${{ env.GOLANG_TESTS_REF }}"

      - name: Setup Konveyor
        uses: konveyor/ci/setup-konveyor-minikube@main
        with:
          artifact: ${{ inputs.artifact }}
          operator_bundle: ${{ inputs.operator_bundle }}
          operator_bundle_fallback: ${{ env.operator_bundle }}
          base_tag: ${{ inputs.base_tag }}
          oauth_proxy: ${{ inputs.oauth_proxy }}
          tackle_hub: ${{ inputs.tackle_hub }}
          tackle_postgres: ${{ inputs.tackle_postgres }}
          keycloak_sso: ${{ inputs.keycloak_sso }}
          keycloak_init: ${{ inputs.keycloak_init }}
          tackle_ui: ${{ inputs.tackle_ui }}
          addon_analyzer: ${{ inputs.addon_analyzer }}
          addon_discovery: ${{ inputs.addon_discovery }}
          namespace: ${{ inputs.namespace }}
          tackle_cr: ${{ inputs.tackle_cr }}

      - uses: actions/setup-go@v5
        with:
          go-version: 1.23
          cache-dependency-path: "**/*.sum"

      - name: Install test dependencies
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo
        working-directory: go-konveyor-tests

      - name: Build and run golang API tests
        env:
          DEBUG: 1
        run: |
          export HUB_BASE_URL="http://$(minikube ip)/hub"
          export HUB_TESTS_REF="${{ inputs.api_hub_tests_ref }}"
          export DEBUG=1
          set -o pipefail; ${{ inputs.api_tests_tiers }} | tee /tmp/tests.log
        working-directory: go-konveyor-tests
      - name: Prepare summary
        working-directory: go-konveyor-tests
        if: always()
        run: |
          if [[ -f /tmp/tests.log ]]; then
            grep -- '---' /tmp/tests.log >> "$GITHUB_STEP_SUMMARY"
          fi || true
      - name: Upload analysis tests output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-tests-output
          include-hidden-files: true
          path: ${{ github.workspace }}/go-konveyor-tests/analysis/tmp_output

  e2e-ui-integration-tests:
    needs: check-images
    if: ${{ inputs.run_ui_tests }}
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    # Note: We can split the input string by comma if we want to run the tags in parallel
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     test-tags:
    #       - ${{ inputs.ui_test_tags }}

    steps:
      - name: Setup Konveyor
        uses: konveyor/ci/setup-konveyor-minikube@main
        with:
          artifact: ${{ inputs.artifact }}
          operator_bundle: ${{ inputs.operator_bundle }}
          operator_bundle_fallback: ${{ env.operator_bundle }}
          base_tag: ${{ inputs.base_tag }}
          oauth_proxy: ${{ inputs.oauth_proxy }}
          tackle_hub: ${{ inputs.tackle_hub }}
          tackle_postgres: ${{ inputs.tackle_postgres }}
          keycloak_sso: ${{ inputs.keycloak_sso }}
          keycloak_init: ${{ inputs.keycloak_init }}
          tackle_ui: ${{ inputs.tackle_ui }}
          addon_analyzer: ${{ inputs.addon_analyzer }}
          addon_discovery: ${{ inputs.addon_discovery }}
          namespace: ${{ inputs.namespace }}
          tackle_cr: ${{ inputs.tackle_cr }}

      - name: Wait for Ingress and expose UI service
        run: |
          kubectl wait \
            -n konveyor-tackle \
            ingress/tackle \
            --timeout=600s \
            --for=jsonpath='{.status.loadBalancer.ingress[0].ip}'

          ingress_ip=$(kubectl get ingress/tackle -n konveyor-tackle -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "ingress is ready at: ${ingress_ip}"
          echo "UI_URL=https://${ingress_ip}" >>$GITHUB_ENV

      - name: Extract pull request number from inputs or PR description
        shell: bash
        env:
          body: ${{ github.event.pull_request.body }}
        run: |
          PULL_REQUEST_NUMBER=$(echo ${body} | grep -oP '[U|u][I|i] [T|t]ests [P|p][R|r]: \K\d+' || true)
          [ -z "$PULL_REQUEST_NUMBER" ] \
            && UI_TESTS_REF=${{ inputs.ui_tests_ref }} \
            || UI_TESTS_REF=refs/pull/$PULL_REQUEST_NUMBER/merge

          echo "UI_TESTS_REF=${UI_TESTS_REF}" >>"$GITHUB_ENV"
          echo "Using UI_TESTS_REF \`${UI_TESTS_REF}\`" >>"$GITHUB_STEP_SUMMARY"

      - name: Run UI tests
        uses: konveyor/tackle2-ui/.github/actions/run-ui-tests@main
        with:
          test_tags: ${{ inputs.ui_test_tags }}
          tests_ref: ${{ env.UI_TESTS_REF }}
          base_url: ${{ env.UI_URL }}

  extract-koncur-ref:
    runs-on: ubuntu-latest
    if: ${{ inputs.run_koncur_hub_tests || inputs.run_koncur_kantra_tests }}
    outputs:
      koncur_ref: ${{ steps.extract.outputs.koncur_ref }}
    steps:
      - name: Extract koncur pull request number from inputs or PR description
        id: extract
        env:
          body: ${{ github.event.pull_request.body }}
        run: |
          PULL_REQUEST_NUMBER=$(echo ${body} | grep -oP '[K|k]oncur [P|p][R|r]:\s*\K\d+' || true)
          [ -z "$PULL_REQUEST_NUMBER" ] \
            && KONCUR_REF="$KONCUR_REF_INPUT" \
            || KONCUR_REF=refs/pull/$PULL_REQUEST_NUMBER/merge

          echo "koncur_ref=${KONCUR_REF}" >>"$GITHUB_OUTPUT"
          echo "Using KONCUR_REF \`${KONCUR_REF}\`" >>"$GITHUB_STEP_SUMMARY"

  koncur-hub-tests:
    needs: [check-images, extract-koncur-ref]
    runs-on: ubuntu-latest
    if: ${{ inputs.run_koncur_hub_tests }}
    steps:
      - name: Setup Konveyor
        uses: konveyor/ci/setup-konveyor-minikube@main
        with:
          artifact: ${{ inputs.artifact }}
          operator_bundle: ${{ inputs.operator_bundle }}
          operator_bundle_fallback: ${{ env.operator_bundle }}
          base_tag: ${{ inputs.base_tag }}
          oauth_proxy: ${{ inputs.oauth_proxy }}
          tackle_hub: ${{ inputs.tackle_hub }}
          tackle_postgres: ${{ inputs.tackle_postgres }}
          keycloak_sso: ${{ inputs.keycloak_sso }}
          keycloak_init: ${{ inputs.keycloak_init }}
          tackle_ui: ${{ inputs.tackle_ui }}
          addon_analyzer: ${{ inputs.addon_analyzer }}
          addon_discovery: ${{ inputs.addon_discovery }}
          namespace: ${{ inputs.namespace }}
          tackle_cr: ${{ inputs.tackle_cr }}

      - name: Checkout koncur
        uses: actions/checkout@v4
        with:
          repository: konveyor/koncur
          ref: ${{ needs.extract-koncur-ref.outputs.koncur_ref }}
          path: koncur

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Koncur
        run: |
          cd koncur
          go build -o $HOME/.local/bin/koncur ./cmd/koncur/main.go
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Start port-forward
        run: |
          kubectl port-forward -n konveyor-tackle svc/tackle-hub 8081:8080 &
          sleep 5

      - name: Create Hub target config
        run: |
          mkdir -p .koncur/config
          cat > .koncur/config/target-tackle-hub.yaml << 'EOF'
          type: tackle-hub
          tackleHub:
            url: http://localhost:8081
          EOF

      - name: Run Koncur Hub tests
        working-directory: koncur
        env:
          SKIP_MAVEN: ${{ inputs.koncur_skip_maven }}
        run: koncur run tests -t tackle-hub --target-config ../.koncur/config/target-tackle-hub.yaml -o yaml --output-file test-hub.yaml

      - name: Upload result yaml
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: koncur-hub-summary
          path: koncur/test-hub.yaml
          retention-days: 3

  koncur-kantra-tests:
    needs: [check-images, extract-koncur-ref]
    runs-on: ${{ matrix.runner }}
#   See https://github.com/konveyor/ci/issues/224
    if: ${{ inputs.run_koncur_kantra_tests && (matrix.os != 'windows' || inputs.run_windows_kantra_tests) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04-arm
          - os: windows
            runner: windows-latest
    steps:
      - name: Download and install kantra (linux)
        if: ${{ matrix.os == 'linux' }}
        run: |
          KANTRA_IMAGE="$KANTRA_INPUT"
          if [ -z "$KANTRA_IMAGE" ]; then
            KANTRA_IMAGE="quay.io/konveyor/kantra:${BASE_TAG_INPUT}"
          fi
          mkdir -p $HOME/.local/bin
          podman cp "$(podman create --name kantra-download "$KANTRA_IMAGE")":/usr/local/bin/kantra $HOME/.local/bin/kantra
          podman rm kantra-download
          chmod +x $HOME/.local/bin/kantra
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install podman (windows)
        if: ${{ matrix.os == 'windows' }}
        shell: bash
        run: |
          choco install podman-cli
          podman machine init --rootful --memory 10240 --cpus 3
          podman machine start

      - name: Download and install kantra (windows)
        if: ${{ matrix.os == 'windows' }}
        shell: bash
        run: |
          KANTRA_IMAGE="$KANTRA_INPUT"
          if [ -z "$KANTRA_IMAGE" ]; then
            KANTRA_IMAGE="quay.io/konveyor/kantra:${BASE_TAG_INPUT}"
          fi
          mkdir -p $HOME/.local/bin
          podman cp "$(podman create --name kantra-download "$KANTRA_IMAGE")":/usr/local/bin/windows-kantra $HOME/.local/bin/kantra.exe
          podman rm kantra-download

      - name: Add local bin to path (windows)
        if: ${{ matrix.os == 'windows' }}
        shell: powershell
        run: |
          $newPath = "$env:USERPROFILE\.local\bin"
          Write-Output "$newPath" >> $env:GITHUB_PATH

      - name: Checkout koncur
        uses: actions/checkout@v4
        with:
          repository: konveyor/koncur
          ref: ${{ needs.extract-koncur-ref.outputs.koncur_ref }}
          path: koncur

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Koncur
        shell: bash
        run: |
          cd koncur
          go build -o $HOME/.local/bin/koncur ./cmd/koncur/main.go

      - name: Run Koncur Kantra tests
        shell: bash
        working-directory: koncur
        env:
          SKIP_MAVEN: ${{ inputs.koncur_skip_maven }}
        run: koncur run tests -t kantra -o yaml --output-file test-kantra.yaml

      - name: Upload result yaml
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: koncur-kantra-${{ matrix.os }}-summary
          path: koncur/test-kantra.yaml
          retention-days: 3
