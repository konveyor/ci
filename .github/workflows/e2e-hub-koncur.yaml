name: Run Koncur with tackle-hub config e2e

on:
  workflow_call:
    inputs:
      tag:
        description: |
          image tag forwarded to e2e-image-build. When omitted, e2e-image-build uses the
          same branch_YYYY.MM.DD default as nightly-koncur.
        required: false
        type: string
  workflow_dispatch:
    inputs:
      repo:
        description: |
          This is the repo to simulate the testing from.
      ref:
        description: |
          The ref that should be tested from. Could be a branch or PR. that should be used to pull all konveyor related repos.
          For example, if you wanted to set a nightly build for release-0.8, you would specify
          "release-0.8".
        required: false
        type: string
        default: main
      tag:
        description: |
          image tag forwarded to e2e-image-build. When omitted, nightly-style default applies.
        required: false
        type: string

jobs:

  build-images:
    uses: ./.github/workflows/e2e-image-build.yaml
    with:
      repo: ${{ inputs.repo || github.repository }}
      ref: ${{ inputs.ref || github.ref }}
      tag: ${{ inputs.tag }}
    secrets: inherit

  run-koncur-action:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Run Koncur Testing
        uses: konveyor/ci/koncur-tackle-hub@main
        with:
          image_pattern: |
            *{tackle-keycloak-init,tackle2-*,provider}--${{ needs.build-images.outputs.image_tag }}
          ref: ${{ github.base_ref || inputs.ref || github.ref_name }}
