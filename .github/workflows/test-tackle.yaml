name: Tackle Setup + Status + Teardown

on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:

jobs:

  build-images:
    uses: konveyor/ci/.github/workflows/e2e-image-build.yaml
    with:
      repo: ${{ github.repository }}
      ref: main
    secrets: inherit

  test-tackle:
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    strategy:
      matrix:
        auth: [false, true]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make tackle.sh executable
        run: chmod +x scripts/tackle.sh

      - name: Install dependencies
        run: scripts/tackle.sh install-deps

      - name: Install Tackle (${{ matrix.auth && 'with auth' || 'without auth' }})

        run: |
          if [ "${{ matrix.auth }}" = "true" ]; then
            scripts/tackle.sh install --auth
          else
            scripts/tackle.sh install --no-auth
          fi

      - name: Show Tackle status
        run: scripts/tackle.sh status

      - name: Teardown Tackle
        if: always()
        run: |
          scripts/tackle.sh uninstall || true
          kind delete cluster --name tackle-test || true

