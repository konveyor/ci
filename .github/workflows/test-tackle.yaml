name: Tackle Setup + Status + Teardown

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  build-images:
    uses: jortel/tackle2-hub/.github/workflows/main.yml@056702a8b3ab4b4d3f9bf0067920c0febb5520e6
    secrets: inherit

  test-tackle:
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    strategy:
      matrix:
        auth: [false, true]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make tackle.sh executable
        run: chmod +x scripts/tackle.sh

      - name: Install dependencies
        run: scripts/tackle.sh install-deps

      - name: Install Tackle (${{ matrix.auth && 'with auth' || 'without auth' }})
        env:
          # Adjust based on actual outputs / tag pattern from build-images job
          HUB: ${{ needs.build-images.outputs.hub-image || format('quay.io/konveyor/tackle2-hub:pr-{0}-{1}', github.event.number || github.sha, github.sha) }}
          ANALYZER_ADDON: ${{ needs.build-images.outputs.analyzer-image || format('quay.io/konveyor/tackle2-addon-analyzer:pr-{0}-{1}', github.event.number || github.sha, github.sha) }}
          # add more if needed
        run: |
          if [ "${{ matrix.auth }}" = "true" ]; then
            scripts/tackle.sh install --auth
          else
            scripts/tackle.sh install --no-auth
          fi

      - name: Show Tackle status
        run: scripts/tackle.sh status

      - name: Teardown Tackle
        if: always()
        run: |
          scripts/tackle.sh uninstall || true
          kind delete cluster --name tackle-test || true

