name: Setup Konveyor
description: Create Kind cluster, load images from artifact, build bundle if needed, and install Konveyor

inputs:
  artifact:
    description: Name of artifact containing custom images to load
    required: false
    default: ""
  operator_bundle:
    description: Image URI for operator-bundle. If empty, a bundle will be built.
    required: false
    default: ""
  operator_bundle_fallback:
    description: Fallback operator bundle URI used when building custom bundle
    required: false
    default: ""
  base_tag:
    description: Tag for operator image to build custom bundle on top of
    required: false
    default: "latest"
  oauth_proxy:
    description: Image URI for oauth_proxy
    required: false
    default: ""
  tackle_hub:
    description: Image URI for tackle-hub
    required: false
    default: ""
  tackle_postgres:
    description: Image URI for tackle-postgres
    required: false
    default: ""
  keycloak_sso:
    description: Image URI for keycloak_sso
    required: false
    default: ""
  keycloak_init:
    description: Image URI for keycloak_init
    required: false
    default: ""
  tackle_ui:
    description: Image URI for tackle-ui
    required: false
    default: ""
  addon_analyzer:
    description: Image URI for analyzer addon
    required: false
    default: ""
  addon_discovery:
    description: Image URI for discovery addon
    required: false
    default: ""
  namespace:
    description: Namespace for the konveyor install
    required: false
    default: ""
  tackle_cr:
    description: Full YAML/JSON string representing the Tackle resource to create
    required: false
    default: |
      kind: Tackle
      apiVersion: tackle.konveyor.io/v1alpha1
      metadata:
        name: tackle
      spec:
        image_pull_policy: IfNotPresent
        analyzer_container_requests_cpu: 100m
        provider_java_container_requests_cpu: 100m
        provider_python_container_requests_cpu: 100m
        feature_auth_required: false
        disable_maven_search: true

runs:
  using: "composite"
  steps:
    - name: Create Kind cluster
      shell: bash
      run: |
        # Create Kind config with ingress support
        cat > /tmp/kind-config.yaml << 'EOF'
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: InitConfiguration
            nodeRegistration:
              kubeletExtraArgs:
                node-labels: "ingress-ready=true"
          extraPortMappings:
          - containerPort: 80
            hostPort: 80
            protocol: TCP
          - containerPort: 443
            hostPort: 443
            protocol: TCP
        EOF

        kind create cluster --name konveyor-test --config /tmp/kind-config.yaml

        # Install ingress-nginx controller for Kind
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.2/deploy/static/provider/kind/deploy.yaml

        # Wait for ingress controller to be ready
        echo "Waiting for ingress controller pod to be created..."
        until kubectl get pods -n ingress-nginx -l app.kubernetes.io/component=controller 2>/dev/null | grep -q .; do
          sleep 2
        done
        echo "Waiting for ingress controller to be ready..."
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=300s

    - name: Download artifact
      if: ${{ inputs.artifact != '' }}
      id: download-artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: /tmp/container_images

    - name: Load images
      if: ${{ inputs.artifact != '' }}
      shell: bash
      env:
        IMAGES_PATH: ${{ steps.download-artifact.outputs.download-path }}
      run: |
        for image in $(find "${IMAGES_PATH}" -type f -name "*.tar"); do
          echo "Loading image \`${image}\`" >>"$GITHUB_STEP_SUMMARY"
          kind load image-archive "${image}" --name konveyor-test
        done

    - name: Checkout tackle2-operator
      uses: actions/checkout@v4
      with:
        repository: konveyor/tackle2-operator
        ref: ${{ inputs.base_tag == 'latest' && 'main' || inputs.base_tag }}
        path: tackle2-operator

    - name: Make bundle
      if: ${{ inputs.operator_bundle == '' }}
      uses: ./tackle2-operator/.github/actions/make-bundle
      with:
        operator_bundle: ${{ inputs.operator_bundle_fallback }}
        operator: quay.io/konveyor/tackle2-operator:${{ inputs.base_tag }}
        oauth_proxy: ${{ inputs.oauth_proxy }}
        tackle_hub: ${{ inputs.tackle_hub }}
        tackle_postgres: ${{ inputs.tackle_postgres }}
        keycloak_sso: ${{ inputs.keycloak_sso }}
        keycloak_init: ${{ inputs.keycloak_init }}
        tackle_ui: ${{ inputs.tackle_ui }}
        addon_analyzer: ${{ inputs.addon_analyzer }}
        addon_discovery: ${{ inputs.addon_discovery }}

    - name: Push bundle
      if: ${{ inputs.operator_bundle == '' }}
      shell: bash
      run: docker push ${{ inputs.operator_bundle_fallback }}

    - name: Install konveyor
      uses: ./tackle2-operator/.github/actions/install-konveyor
      with:
        bundle_image: ${{ inputs.operator_bundle == '' && inputs.operator_bundle_fallback || inputs.operator_bundle }}
        namespace: ${{ inputs.namespace }}
        tackle_cr: ${{ inputs.tackle_cr }}
